name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read
  packages: write

jobs:
  ci:
    uses: chris-arsenault/ahara/.github/workflows/ci.yml@main
    with:
      rust_extra_ci_commands: |
        (cd backend && cargo test --release --test structure_lint)
        ./scripts/run-backend-integration-tests.sh
    secrets: inherit
