services:
  backend:
    image: ghcr.io/chris-arsenault/shuttlecraft/backend:${IMAGE_TAG}
    container_name: shuttlecraft-backend
    restart: unless-stopped
    environment:
      # DB connects to the shared TrueNAS Postgres (192.168.66.3:5432).
      # DB + role + SSM creds are auto-provisioned by the
      # ahara-db-migrate-truenas Lambda once shuttlecraft is registered
      # in ahara-infra/infrastructure/terraform/services/db-migrate-truenas.tf.
      SHUTTLECRAFT_DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@192.168.66.3:5432/shuttlecraft"
      SHUTTLECRAFT_LISTEN: "0.0.0.0:8080"
      SHUTTLECRAFT_REPOS_ROOT: "/home/dev/repos"
      SHUTTLECRAFT_CLAUDE_PROJECTS: "/home/dev/.claude/projects"
      SHUTTLECRAFT_CORRELATE_SOCK: "/run/shuttlecraft/correlate.sock"
      HOME: "/home/dev"
    volumes:
      # Single bind mount: the dataset root *is* the dev user's home.
      # The container entrypoint self-provisions the subtree on first
      # boot; TrueNAS operator only needs to create the dataset and
      # chown it to 7321:7321.
      - /mnt/apps/apps/shuttlecraft:/home/dev
      - shuttlecraft_run:/run/shuttlecraft

  frontend:
    image: ghcr.io/chris-arsenault/shuttlecraft/frontend:${IMAGE_TAG}
    container_name: shuttlecraft-frontend
    restart: unless-stopped
    ports:
      - "192.168.66.3:30080:80"
    # No depends_on: the frontend is an nginx serving static files plus a
    # reverse proxy for /api and /ws. It can start independently of the
    # backend — requests to proxied paths 502 until the backend is up,
    # but the UI shell loads either way.

volumes:
  shuttlecraft_run:
