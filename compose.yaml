services:
  backend:
    image: ghcr.io/chris-arsenault/sulion/backend:${IMAGE_TAG}
    container_name: sulion-backend
    restart: unless-stopped
    environment:
      # DB connects to the shared TrueNAS Postgres (192.168.66.3:5432).
      # DB + role + SSM creds are auto-provisioned by the
      # ahara-db-migrate-truenas Lambda once sulion is registered
      # in ahara-infra/infrastructure/terraform/services/db-migrate-truenas.tf.
      SULION_DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@192.168.66.3:5432/sulion"
      SULION_LISTEN: "0.0.0.0:8080"
      SULION_REPOS_ROOT: "/home/dev/repos"
      SULION_WORKSPACES_ROOT: "/home/dev/workspaces"
      SULION_CLAUDE_PROJECTS: "/home/dev/.claude/projects"
      SULION_CODEX_SESSIONS: "/home/dev/.codex/sessions"
      SULION_CORRELATE_SOCK: "/run/sulion/correlate.sock"
      SULION_AUTH_ISSUER_URL: "${SULION_AUTH_ISSUER_URL}"
      SULION_AUTH_CLIENT_ID: "${SULION_AUTH_CLIENT_ID}"
      SULION_SECRET_BROKER_URL: "http://sulion-broker:8081"
      SULION_SECRET_BROKER_REGISTRATION_TOKEN: "${SULION_SECRET_BROKER_REGISTRATION_TOKEN}"
      SULION_AWS_SECRET_ID: "aws-default"
      SULION_RUNNER_URL: "http://sulion-runner:8082"
      HOME: "/home/dev"
    volumes:
      # Primary bind: the dataset root *is* the dev user's home.
      # The container entrypoint self-provisions the subtree on first
      # boot; TrueNAS operator only needs to create the dataset and
      # chown it to 7321:7321.
      - /mnt/apps/apps/sulion:/home/dev
      # Repos on a nested dataset so the tree can be shared via
      # NFS/SMB and snapshotted independently of home. Docker binds
      # plain (not rbind), so a child ZFS dataset under the primary
      # bind isn't visible through /home/dev — needs its own explicit
      # mount. Works as a plain directory too before the dataset is
      # created, so ordering of the bootstrap vs deploy doesn't matter.
      - /mnt/apps/apps/sulion/repos:/home/dev/repos
      - /mnt/apps/apps/sulion/workspaces:/home/dev/workspaces
      - sulion_run:/run/sulion

  broker:
    image: ghcr.io/chris-arsenault/sulion/broker:${IMAGE_TAG}
    container_name: sulion-broker
    restart: unless-stopped
    environment:
      SULION_SECRET_BROKER_LISTEN: "0.0.0.0:8081"
      SULION_SECRET_BROKER_DB_URL: "postgres://${BROKER_DB_USER}:${BROKER_DB_PASSWORD}@192.168.66.3:5432/sulion_broker"
      SULION_SECRET_BROKER_MASTER_KEY_PATH: "/var/lib/sulion-broker/master.key"
      SULION_AUTH_ISSUER_URL: "${SULION_AUTH_ISSUER_URL}"
      SULION_AUTH_CLIENT_ID: "${SULION_AUTH_CLIENT_ID}"
      SULION_SECRET_BROKER_REGISTRATION_TOKEN: "${SULION_SECRET_BROKER_REGISTRATION_TOKEN}"
    volumes:
      - /mnt/apps/apps/sulion-broker:/var/lib/sulion-broker:ro

  runner:
    image: ghcr.io/chris-arsenault/sulion/runner:${IMAGE_TAG}
    container_name: sulion-runner
    restart: unless-stopped
    environment:
      SULION_RUNNER_LISTEN: "0.0.0.0:8082"
      SULION_RUNNER_ALLOWED_ROOTS: "/home/dev/repos,/home/dev/workspaces"
      SULION_RUNNER_DEFAULT_MEMORY: "2g"
      SULION_RUNNER_DEFAULT_CPUS: "2"
      SULION_RUNNER_DEFAULT_PIDS: "512"
    volumes:
      # The runner reads the same workspace paths as backend so
      # `docker build .` uses Docker's normal local context handling.
      # The Docker socket is the runner's privileged boundary; backend
      # and PTYs never receive it.
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/apps/apps/sulion:/home/dev:ro
      - /mnt/apps/apps/sulion/repos:/home/dev/repos:ro
      - /mnt/apps/apps/sulion/workspaces:/home/dev/workspaces:ro

  frontend:
    image: ghcr.io/chris-arsenault/sulion/frontend:${IMAGE_TAG}
    container_name: sulion-frontend
    restart: unless-stopped
    ports:
      - "192.168.66.3:30080:80"
    environment:
      SULION_COGNITO_USER_POOL_ID: "${SULION_COGNITO_USER_POOL_ID}"
      SULION_COGNITO_CLIENT_ID: "${SULION_COGNITO_CLIENT_ID}"
    # No depends_on: the frontend is an nginx serving static files plus a
    # reverse proxy for /api and /ws. It can start independently of the
    # backend — requests to proxied paths 502 until the backend is up,
    # but the UI shell loads either way.

volumes:
  sulion_run:
