services:
  backend:
    image: ghcr.io/chris-arsenault/sulion/backend:${IMAGE_TAG}
    container_name: sulion-backend
    restart: unless-stopped
    environment:
      # DB connects to the shared TrueNAS Postgres (192.168.66.3:5432).
      # DB + role + SSM creds are auto-provisioned by the
      # ahara-db-migrate-truenas Lambda once sulion is registered
      # in ahara-infra/infrastructure/terraform/services/db-migrate-truenas.tf.
      SULION_DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@192.168.66.3:5432/sulion"
      SULION_LISTEN: "0.0.0.0:8080"
      SULION_REPOS_ROOT: "/home/dev/repos"
      SULION_CLAUDE_PROJECTS: "/home/dev/.claude/projects"
      SULION_CODEX_SESSIONS: "/home/dev/.codex/sessions"
      SULION_CORRELATE_SOCK: "/run/sulion/correlate.sock"
      HOME: "/home/dev"
    volumes:
      # Primary bind: the dataset root *is* the dev user's home.
      # The container entrypoint self-provisions the subtree on first
      # boot; TrueNAS operator only needs to create the dataset and
      # chown it to 7321:7321.
      - /mnt/apps/apps/sulion:/home/dev
      # Repos on a nested dataset so the tree can be shared via
      # NFS/SMB and snapshotted independently of home. Docker binds
      # plain (not rbind), so a child ZFS dataset under the primary
      # bind isn't visible through /home/dev — needs its own explicit
      # mount. Works as a plain directory too before the dataset is
      # created, so ordering of the bootstrap vs deploy doesn't matter.
      - /mnt/apps/apps/sulion/repos:/home/dev/repos
      # Rootless-podman image/container store on its own nested
      # dataset so it's monitorable (`du -sh`) and clearable
      # (`podman system reset`) without touching user state. ZFS
      # snapshots don't recurse into child datasets by default, so
      # nesting doesn't bloat parent snapshots. Dataset must exist
      # on the host and be chowned to 7321:7321 (see docs/deploy.md).
      - /mnt/apps/apps/sulion/containers:/home/dev/.local/share/containers
      - sulion_run:/run/sulion
    devices:
      # Rootless podman's overlay driver uses fuse-overlayfs, which
      # needs /dev/fuse exposed. Without it podman silently falls back
      # to the vfs driver (slow, duplicates every layer).
      - /dev/fuse
    cap_add:
      # rootless podman uses user namespaces from *inside* the
      # container; the kernel needs these caps present on the outer
      # process to let newuidmap/newgidmap do the setuid mapping.
      - SETUID
      - SETGID
    security_opt:
      # Docker's default seccomp profile blocks the clone3 / unshare
      # syscalls podman needs for its nested user namespaces. Rather
      # than dropping all seccomp, we point at podman's upstream
      # profile — permissive enough for nested rootless but still
      # blocks historically-dangerous syscalls (reboot, kexec_load,
      # perf_event_open, various keyring/mount variants). The daemon
      # reads this path on the host, so it must be absolute. Copy
      # `backend/seccomp.json` from the repo to this path during
      # bootstrap (see docs/deploy.md).
      - "seccomp:unconfined"

  frontend:
    image: ghcr.io/chris-arsenault/sulion/frontend:${IMAGE_TAG}
    container_name: sulion-frontend
    restart: unless-stopped
    ports:
      - "192.168.66.3:30080:80"
    # No depends_on: the frontend is an nginx serving static files plus a
    # reverse proxy for /api and /ws. It can start independently of the
    # backend — requests to proxied paths 502 until the backend is up,
    # but the UI shell loads either way.

volumes:
  sulion_run:
