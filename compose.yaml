services:
  backend:
    image: ghcr.io/chris-arsenault/sulion/backend:${IMAGE_TAG}
    container_name: sulion-backend
    restart: unless-stopped
    environment:
      # DB connects to the shared TrueNAS Postgres (192.168.66.3:5432).
      # DB + role + SSM creds are auto-provisioned by the
      # ahara-db-migrate-truenas Lambda once sulion is registered
      # in ahara-infra/infrastructure/terraform/services/db-migrate-truenas.tf.
      SULION_DB_URL: "postgres://${DB_USER}:${DB_PASSWORD}@192.168.66.3:5432/sulion"
      SULION_LISTEN: "0.0.0.0:8080"
      SULION_REPOS_ROOT: "/home/dev/repos"
      SULION_CLAUDE_PROJECTS: "/home/dev/.claude/projects"
      SULION_CORRELATE_SOCK: "/run/sulion/correlate.sock"
      HOME: "/home/dev"
    volumes:
      # Single bind mount: the dataset root *is* the dev user's home.
      # The container entrypoint self-provisions the subtree on first
      # boot; TrueNAS operator only needs to create the dataset and
      # chown it to 7321:7321.
      - /mnt/apps/apps/sulion:/home/dev
      - sulion_run:/run/sulion

  frontend:
    image: ghcr.io/chris-arsenault/sulion/frontend:${IMAGE_TAG}
    container_name: sulion-frontend
    restart: unless-stopped
    ports:
      - "192.168.66.3:30080:80"
    # No depends_on: the frontend is an nginx serving static files plus a
    # reverse proxy for /api and /ws. It can start independently of the
    # backend — requests to proxied paths 502 until the backend is up,
    # but the UI shell loads either way.

volumes:
  sulion_run:
